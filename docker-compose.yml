services:
  db:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: voc_ai
      POSTGRES_USER: voc
      POSTGRES_PASSWORD: ${DB_PASSWORD:-vocpassword}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U voc"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
